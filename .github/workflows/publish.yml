name: Publish k-diagram to PyPI

# Triggered when a version tag is pushed, e.g. git tag v1.4.0 && git push --tags
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

jobs:
  # ── 1. Run the test suite (single Python version for speed) ─────────────────
  test:
    name: Tests (Python 3.11)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-variant: Miniforge3
          miniforge-version: latest
          use-mamba: true
          activate-environment: k-diagram-dev
          environment-file: environment.yml
          python-version: "3.11"

      - name: Install package (dev extras)
        run: |
          python -m pip install -U pip
          pip install -e .[dev]

      - name: Run tests
        run: pytest -n auto --cov=kdiagram --cov-report=xml tests/

  # ── 2. Build sdist + wheel ───────────────────────────────────────────────────
  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build frontend
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Check dist contents
        run: ls -lh dist/

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── 3. Publish to TestPyPI ───────────────────────────────────────────────────
  # Uses the repository secret TEST_PYPI_API_TOKEN.
  # Generate a token at https://test.pypi.org/manage/account/token/
  # and store it in Settings → Secrets → Actions → TEST_PYPI_API_TOKEN.
  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}

  # ── 4. Publish to PyPI ───────────────────────────────────────────────────────
  # Uses the repository secret PYPI_API_TOKEN.
  # Generate a token at https://pypi.org/manage/account/token/
  # and store it in Settings → Secrets → Actions → PYPI_API_TOKEN.
  publish-pypi:
    name: Publish to PyPI
    needs: publish-testpypi
    runs-on: ubuntu-latest

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  # ── 5. Create GitHub Release ─────────────────────────────────────────────────
  # Creates a GitHub Release from the tag so the "release" badge in README
  # reflects the new version. The release notes are auto-generated from
  # commit messages since the previous tag.
  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest

    permissions:
      contents: write   # required to create releases

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for changelog generation

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          make_latest: true
